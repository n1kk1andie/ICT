<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>VM Group — ICT Services Availability Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--red:#E4012B;--ink:#1C1416;--paper:#F6F3F1;--dim:#8A7E7A;--line:#EEE7E3;--green:#0E8A4D;--amber:#B45309;--orange:#C2410C;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;}
.shell{min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:430px;display:flex;flex-direction:column;min-height:100vh;}
.content{flex:1;padding:4px 16px 100px;}
.appbar{position:sticky;top:0;z-index:10;background:rgba(246,243,241,.95);backdrop-filter:blur(10px);padding:14px 16px 10px;display:flex;align-items:center;gap:11px;}
.brand{font-family:Sora,sans-serif;font-weight:800;font-size:15px;letter-spacing:-.01em;white-space:nowrap;}
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(28,20,22,.07);margin-bottom:10px;}
.hero{background:linear-gradient(160deg,#E4012B 0%,#A60020 100%);border-radius:22px;padding:20px 18px 18px;color:#fff;box-shadow:0 8px 24px rgba(164,1,35,.25);margin-bottom:12px;}
.eyebrow{font-family:Sora;font-size:11px;font-weight:700;letter-spacing:.12em;opacity:.85;}
.big{font-family:Sora;font-size:46px;font-weight:800;line-height:1.05;margin:4px 0 2px;}
.num18{font-family:Sora;font-size:18px;font-weight:800;}
.num16{font-family:Sora;font-size:16px;font-weight:800;}
.t15{font-family:Sora;font-size:15px;font-weight:700;}
.t14{font-family:Sora;font-size:14px;font-weight:700;}
.t13{font-size:13px;font-weight:600;line-height:1.3;}
.sub{font-size:11px;color:var(--dim);}
.sub13{font-size:12.5px;color:#6E625E;line-height:1.5;}
.dim11{font-size:11px;opacity:.8;}
.b{font-weight:700;}
.h2l{font-family:Sora;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:20px 0 10px;}
.row{display:flex;}.col{display:flex;flex-direction:column;}.mid{align-items:center;}
.between{justify-content:space-between;}.wrap{flex-wrap:wrap;}
.gap6{gap:6px;}.gap8{gap:8px;}.gap10{gap:10px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.chip{border:1px solid #E4DDD9;background:#fff;color:#6E625E;font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;white-space:nowrap;cursor:pointer;flex-shrink:0;font-family:inherit;}
.chip.on{background:var(--red);border-color:var(--red);color:#fff;}
.pill{font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;font-size:10px;display:inline-block;}
.pill.met{background:#DCFCE7;color:#166534;}
.pill.notmet{background:#FEE2E2;color:#991B1B;}
.pill.warn{background:#FEF9C3;color:#854D0E;}
.pill.crit{background:#FFEDD5;color:#9A3412;}
.pill.eol{background:#F3E8FF;color:#6B21A8;}
.pill.ok{background:#DCFCE7;color:#166534;}
.abar{height:5px;border-radius:3px;background:#EEE7E3;overflow:hidden;margin-top:4px;}
.abar-fill{height:100%;border-radius:3px;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;}
.subtab{border:1.5px solid #E4DDD9;background:#fff;color:#6E625E;font-family:Sora;font-weight:700;font-size:12px;padding:7px 14px;border-radius:999px;cursor:pointer;}
.subtab.on{background:var(--red);border-color:var(--red);color:#fff;}
.notebox{font-size:11.5px;color:#6E625E;background:#FAF7F5;border-radius:8px;padding:8px 10px;line-height:1.45;margin-top:6px;}
.cta{width:100%;border:none;background:var(--red);color:#fff;font-family:Sora;font-weight:700;font-size:14px;padding:13px 0;border-radius:12px;cursor:pointer;}
.cta2{width:100%;border:1.5px solid var(--red);background:#fff;color:var(--red);font-family:Sora;font-weight:700;font-size:13px;padding:11px 0;border-radius:12px;cursor:pointer;margin-top:8px;}
.login-in{width:100%;border:1.5px solid #E4DDD9;border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;margin-bottom:10px;}
.errmsg{font-size:12px;color:#991B1B;font-weight:600;margin-bottom:8px;}
.okmsg{font-size:12px;color:#166534;font-weight:600;text-align:center;margin-top:8px;background:#DCFCE7;border-radius:8px;padding:8px 10px;}
.loginpill{display:inline-flex;align-items:center;gap:5px;border:1px solid #E4DDD9;background:#fff;color:#6E625E;font-family:Sora;font-weight:700;font-size:11px;padding:7px 12px;border-radius:999px;cursor:pointer;flex-shrink:0;}
.userchip{width:34px;height:34px;border-radius:99px;background:var(--red);color:#fff;border:none;cursor:pointer;font-family:Sora;font-weight:700;font-size:13px;flex-shrink:0;}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 2px calc(8px + env(safe-area-inset-bottom));z-index:20;}
.tabbtn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 2px;color:#A89C97;font-family:inherit;}
.tabbtn span{font-size:9px;font-weight:700;font-family:Sora;}
.tabbtn.on{color:var(--red);}
.overlay{position:fixed;inset:0;background:rgba(28,20,22,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:20px;padding:22px 20px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(28,20,22,.25);position:relative;}
.modalx{position:absolute;top:10px;right:12px;border:none;background:#F6F3F1;color:#6E625E;width:28px;height:28px;border-radius:99px;cursor:pointer;font-size:13px;font-weight:700;}
.iconwrap{position:relative;display:inline-flex;}
.tablock{position:absolute;top:-4px;right:-8px;background:#fff;border-radius:99px;padding:1px;}
.hmscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hmrow{display:flex;align-items:center;}
.hmname{width:100px;flex-shrink:0;font-size:10px;color:#4A403C;padding-right:6px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hmname.bold{font-weight:700;color:var(--ink);font-size:10.5px;}
.hmcell{width:40px;height:22px;margin:1px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.hmhead{width:40px;font-size:8px;color:#A89C97;text-align:center;font-weight:600;flex-shrink:0;margin:0 1px;}
.hmyear{font-family:Sora;font-size:10px;font-weight:700;color:var(--red);border-bottom:2px solid #F1ECE9;padding-bottom:2px;margin:6px 0 3px;}
.hmgroup{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:8px 0 3px;width:100px;}
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:#6E625E;font-weight:600;}
.sw{width:10px;height:10px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:2px;}
.sel{border:1.5px solid #E4DDD9;border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;}
.ropt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #E4DDD9;border-radius:12px;cursor:pointer;margin-bottom:8px;background:#fff;}
.ropt.on{border-color:var(--red);background:#FFF5F5;}
.ropt-dot{width:16px;height:16px;border-radius:99px;border:2px solid #E4DDD9;flex-shrink:0;}
.ropt.on .ropt-dot{border-color:var(--red);background:var(--red);}

@media(min-width:768px){
  .app{max-width:760px;}
  .content{padding:8px 24px 40px;}
  .grid2{grid-template-columns:repeat(4,1fr);}
  .tabbar{position:sticky;bottom:auto;top:62px;left:auto;transform:none;max-width:none;border-top:none;border-bottom:1px solid var(--line);padding:6px 16px 8px;gap:6px;background:rgba(246,243,241,.95);backdrop-filter:blur(10px);z-index:9;}
  .tabbtn{flex:0 0 auto;flex-direction:row;gap:6px;padding:7px 14px;border-radius:999px;background:#fff;border:1px solid #E4DDD9;}
  .tabbtn.on{background:var(--red);border-color:var(--red);color:#fff;}
  .tabbtn span{font-size:12px;}
  .tablock{top:-5px;right:-9px;}
  .hmcell{width:48px;height:24px;}
  .hmhead{width:48px;}
  .hmname{width:130px;}
  .hmgroup{width:130px;}
}
@media(min-width:1100px){.app{max-width:1020px;}}
</style>
</head>

// -- HELPERS ------------------------------------------------------
const pct2 = v=>(v*100).toFixed(2)+"%";
const pct3 = v=>(v*100).toFixed(3)+"%";
const daysUntil = d=>Math.round((new Date(d)-TODAY)/86400000);
const ls = {
  get(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
function dl(content,name,type){
  const b=content instanceof Blob?content:new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

function availColor(v){
  if(v>=0.9999)return"#16A34A";
  if(v>=0.9990)return"#22C55E";
  if(v>=0.9980)return"#86EFAC";
  if(v>=0.9960)return"#EAB308";
  if(v>=0.9900)return"#F97316";
  return"#DC2626";
}
function availTextDark(v){return v>=0.9980||v<0.9900;}

function lcColor(status){
  return {ok:"#16A34A",warn:"#B45309",critical:"#EA580C",eol:"#7C3AED"}[status]||"#6E625E";
}
function lcPillClass(status){
  return {ok:"ok",warn:"warn",critical:"crit",eol:"eol"}[status]||"ok";
}
function lcLabel(status){
  return {ok:"Supported",warn:"Warning",critical:"Critical",eol:"EOL"}[status]||"OK";
}
function lcBadge(eos,status){
  const d=daysUntil(eos);
  if(status==="eol"||d<0) return {cls:"eol",label:"EOL"};
  if(d<=90)  return {cls:"crit",label:"EOS in "+d+"d"};
  if(d<=180) return {cls:"warn",label:"EOS in "+d+"d"};
  return {cls:"ok",label:"Supported"};
}

function AvailBar({value,h=5}){
  return(
    <div className="abar" style={{height:h}}>
      <div className="abar-fill" style={{width:Math.min(100,value*100)+"%",background:availColor(value)}}/>
    </div>
  );
}
function SBUTag({sbu}){
  const c={VMBS:"#E4012B",VMWM:"#1D4ED8",VMTS:"#D97706",VMPM:"#7C3AED",VMPS:"#059669"};
  const col=c[sbu]||"#6E625E";
  return <span style={{fontFamily:"Sora",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:99,background:col+"22",color:col}}>{sbu}</span>;
}

// -- LIFECYCLE ----------------------------------------------------
function LifecycleTab(){
  const [catF,setCatF]=useState("All");
  const [stF,setStF]=useState("All");
  const cats=["All",...[...new Set(LIFECYCLE.map(s=>s.cat))]];
  const sts=["All","eol","critical","warn","ok"];
  const stLbl={eol:"EOL",critical:"Critical",warn:"Warning",ok:"Supported"};

  const filtered=LIFECYCLE
    .filter(s=>catF==="All"||s.cat===catF)
    .filter(s=>stF==="All"||s.status===stF)
    .sort((a,b)=>new Date(a.eos)-new Date(b.eos));

  const counts={eol:0,critical:0,warn:0,ok:0};
  LIFECYCLE.forEach(s=>{const d=daysUntil(s.eos);const eff=d<0?"eol":d<=90?"critical":d<=180?"warn":"ok";counts[eff]++;});

  return(
    <div>
      <div className="grid2" style={{marginBottom:12}}>
        {[
          {label:"EOL - No Support",cnt:counts.eol,cls:"notmet",border:"#FECACA"},
          {label:"Critical <=90d",cnt:counts.critical,cls:"crit",border:"#FED7AA"},
          {label:"Warning <=180d",cnt:counts.warn,cls:"warn",border:"#FDE68A"},
          {label:"Supported",cnt:counts.ok,cls:"ok",border:"#BBF7D0"},
        ].map((m,i)=>(
          <div key={i} className="card" style={{marginBottom:0,border:"1.5px solid "+m.border}}>
            <div className="sub" style={{marginBottom:3,fontSize:10}}>{m.label}</div>
            <div className="num18">{m.cnt}</div>
          </div>
        ))}
      </div>

      <div className="chips" style={{marginBottom:6}}>
        {sts.map(s=><button key={s} className={"chip"+(stF===s?" on":"")} onClick={()=>setStF(s)}>{stLbl[s]||"All"}</button>)}
      </div>
      <div className="chips" style={{marginBottom:14}}>
        {cats.map(c=><button key={c} className={"chip"+(catF===c?" on":"")} onClick={()=>setCatF(c)}>{c}</button>)}
      </div>

      {filtered.map((s,i)=>{
        const d=daysUntil(s.eos);
        const badge=lcBadge(s.eos,s.status);
        return(
          <div key={i} className="card">
            <div className="row between mid" style={{marginBottom:4}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="t13">{s.name}</div>
                <div className="sub">{s.cat}</div>
              </div>
              <span className={"pill "+badge.cls}>{badge.label}</span>
            </div>
            <div className="row between mid">
              <span style={{fontFamily:"Sora",fontSize:11,fontWeight:700,color:d<0?"#DC2626":d<=90?"#EA580C":d<=180?"#B45309":"#6E625E"}}>
                {d<0?"PAST - "+s.eos:"EOS: "+s.eos+" - "+d+"d"}
              </span>
            </div>
            <div className="notebox">{s.note}</div>
          </div>
        );
      })}
    </div>
  );
}

// -- REPORT -------------------------------------------------------
function ReportTab({data}){
  const [scope,setScope]=useState("all");
  const [selMonth,setSelMonth]=useState(data.months[data.months.length-1]);
  const [fmt,setFmt]=useState("pdf");
  const [msg,setMsg]=useState(null);

  function getMonths(){
    return scope==="all" ? data.months : [selMonth];
  }

  function buildReport(){
    if(fmt==="csv"){ buildCSV(); return; }
    try{
      if(!window.jspdf||!window.jspdf.jsPDF) throw new Error("PDF library not loaded");
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"pt",format:"a4"});
      const W=doc.internal.pageSize.getWidth();
      const H=doc.internal.pageSize.getHeight();
      const months=getMonths();

      // Header
      doc.setFillColor(228,1,43);doc.rect(0,0,W,56,"F");
      doc.setTextColor(255);doc.setFont("helvetica","bold");doc.setFontSize(14);
      doc.text("VM Group - ICT Services Availability Monitor",40,26);
      doc.setFont("helvetica","normal");doc.setFontSize(10);
      const subtitle = scope==="all"
        ? "Full Year Report - "+data.months[0]+" to "+data.months[data.months.length-1]
        : "Monthly Report - "+selMonth;
      doc.text(subtitle,40,44);

      let y=70;
      months.forEach((m,pageIdx)=>{
        const mi=data.months.indexOf(m);
        if(pageIdx>0){ doc.addPage(); y=30; }

        // Month heading
        doc.setFillColor(248,243,241);doc.roundedRect(36,y,W-72,50,5,5,"F");
        doc.setTextColor(28,20,22);doc.setFont("helvetica","bold");doc.setFontSize(11);
        doc.text(m,44,y+15);
        const ov=data.overall[mi];
        doc.setFontSize(20);doc.setTextColor(ov>=TARGET?14:228,ov>=TARGET?138:1,ov>=TARGET?77:43);
        doc.text(pct3(ov),44,y+38);
        doc.setFontSize(10);doc.setTextColor(100);
        doc.text("Target: 99.60%  -  "+(ov>=TARGET?"MET":"NOT MET"),170,y+38);
        y+=60;

        // SBU table
        doc.setTextColor(28,20,22);doc.setFont("helvetica","bold");doc.setFontSize(10);
        doc.text("SBU Performance",40,y);y+=10;
        doc.autoTable({startY:y,
          head:[["SBU","Availability","Met"]],
          body:SBU_LIST.map((sbu,si)=>{const v=data.sbuAvgs[mi][si];return[sbu,pct3(v),v>=TARGET?"Yes":"No"];}),
          styles:{font:"helvetica",fontSize:8,cellPadding:3},
          headStyles:{fillColor:[28,20,22],textColor:255},
          columnStyles:{1:{halign:"right"},2:{halign:"center"}},
          margin:{left:40,right:40}});
        y=doc.lastAutoTable.finalY+10;

        // Branch misses
        const bd=BRANCH_DATA[m]||{};
        const misses=[];
        Object.keys(bd).forEach(sbu=>bd[sbu].filter(b=>!b.met).forEach(b=>misses.push({sbu,loc:b.loc,pct:b.pct,note:b.note})));
        if(misses.length){
          doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(28,20,22);
          doc.text("Branch SLA Misses",40,y);y+=10;
          doc.autoTable({startY:y,head:[["SBU","Location","Availability","Notes"]],
            body:misses.map(ms=>[ms.sbu,ms.loc,pct3(ms.pct),ms.note]),
            styles:{font:"helvetica",fontSize:8,cellPadding:3},
            headStyles:{fillColor:[228,1,43],textColor:255},
            columnStyles:{2:{halign:"right"}},margin:{left:40,right:40}});
          y=doc.lastAutoTable.finalY+10;
        }
      });

      // Footer on last page
      doc.setTextColor(160);doc.setFontSize(8);doc.setFont("helvetica","normal");
      doc.text("VM Group - ICT Services - Generated "+new Date().toLocaleDateString("en-JM"),40,H-18);

      const fname = scope==="all"
        ? "VM_ICT_Availability_Full_YTD.pdf"
        : "VM_ICT_Availability_"+selMonth.replace("'","").replace(" ","")+".pdf";
      doc.save(fname);
      setMsg("PDF downloaded");setTimeout(()=>setMsg(null),3000);
    }catch(e){setMsg("Error: "+e.message);}
  }

  function buildCSV(){
    const NL="\n";
    const months=getMonths();
    let csv="VM Group ICT Availability Report"+NL;
    csv+=(scope==="all"?"Full Year: "+data.months[0]+" to "+data.months[data.months.length-1]:"Period: "+selMonth)+NL+NL;
    months.forEach(m=>{
      const mi=data.months.indexOf(m);
      csv+=m+NL+"SBU,Availability,Target Met"+NL;
      SBU_LIST.forEach((sbu,si)=>{const v=data.sbuAvgs[mi][si];csv+=sbu+","+pct3(v)+","+(v>=TARGET?"Yes":"No")+NL;});
      const bd=BRANCH_DATA[m]||{};
      const misses=[];
      Object.keys(bd).forEach(sbu=>bd[sbu].filter(b=>!b.met).forEach(b=>misses.push({sbu,loc:b.loc,pct:b.pct,note:b.note})));
      if(misses.length){
        csv+=NL+"Branch SLA Misses"+NL+"SBU,Location,Availability,Notes"+NL;
        misses.forEach(ms=>{ csv+=ms.sbu+","+ms.loc+","+pct3(ms.pct)+',"'+ms.note+'"'+NL; });
      }
      csv+=NL;
    });
    const fname = scope==="all"?"VM_ICT_Full_YTD.csv":"VM_ICT_"+selMonth.replace("'","").replace(" ","")+".csv";
    dl(csv,fname,"text/csv");
    setMsg("CSV downloaded");setTimeout(()=>setMsg(null),3000);
  }

  return(
    <div>
      <div className="h2l">Coverage</div>
      <div className="chips" style={{marginBottom:12}}>
        <button className={"chip"+(scope==="all"?" on":"")} onClick={()=>setScope("all")}>All Periods</button>
        <button className={"chip"+(scope==="select"?" on":"")} onClick={()=>setScope("select")}>Select Period</button>
      </div>
      {scope==="select"&&(
        <div className="card" style={{marginBottom:12}}>
          <select className="sel" value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
            {data.months.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
      )}
      <div className="h2l">Format</div>
      <div className="chips" style={{marginBottom:16}}>
        <button className={"chip"+(fmt==="pdf"?" on":"")} onClick={()=>setFmt("pdf")}>PDF</button>
        <button className={"chip"+(fmt==="csv"?" on":"")} onClick={()=>setFmt("csv")}>CSV</button>
      </div>
      <button className="cta" style={{boxShadow:"0 6px 18px rgba(164,1,35,.3)"}} onClick={buildReport}>
        Download {fmt.toUpperCase()} — {scope==="all"?"All Periods":selMonth}
      </button>
      {msg&&<div className={msg.startsWith("Error")?"errmsg":"okmsg"} style={{marginTop:10}}>{msg}</div>}
    </div>
  );
}

function SettingsTab({adminPw,setAdminPw,data,setData}){
  const [cur,setCur]=useState("");const [n1,setN1]=useState("");const [n2,setN2]=useState("");
  const [pwMsg,setPwMsg]=useState(null);const [upMsg,setUpMsg]=useState(null);

  function changePw(){
    if(cur!==adminPw)return setPwMsg("Current password is incorrect.");
    if(n1.length<6)return setPwMsg("New password must be at least 6 characters.");
    if(n1!==n2)return setPwMsg("New passwords do not match.");
    setAdminPw(n1);setCur("");setN1("");setN2("");
    setPwMsg("Password updated.");setTimeout(()=>setPwMsg(null),3000);
  }

  function handleUpload(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const ws=wb.Sheets["Summary"]||wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        let overall=null,newMonth=null,sbuRow=null;
        for(let r of rows){
          if(r[0]&&String(r[0]).includes("Overall Availability"))overall=parseFloat(r[1]);
          if(r[1] instanceof Date||(typeof r[1]==="number"&&r[1]>40000)){
            const d=r[1] instanceof Date?r[1]:new Date(Math.round((r[1]-25569)*86400000));
            newMonth=d.toLocaleString("en",{month:"short"})+" '"+String(d.getFullYear()).slice(2);
          }
          if(r[0]==="AVERAGE"&&r[1]&&r[2])sbuRow=[r[1],r[2],r[3],r[4],r[5]].map(v=>parseFloat(v)||0.9999);
        }
        if(!overall||!newMonth)return setUpMsg("Could not parse file. Check format.");
        if(data.months.includes(newMonth))return setUpMsg(newMonth+" already loaded.");
        // Normalise month key to match BRANCH_DATA quote style
        setData(prev=>({...prev,
          months:[...prev.months,newMonth],overall:[...prev.overall,overall],
          sbuAvgs:[...prev.sbuAvgs,sbuRow||[overall,overall,overall,overall,overall]],
          appAvail:[...prev.appAvail,1],netAvail:[...prev.netAvail,overall],infraAvail:[...prev.infraAvail,1],
        }));
        setUpMsg(""+newMonth+" added.");setTimeout(()=>setUpMsg(null),3000);
      }catch(err){setUpMsg("Upload error: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function downloadTemplate(){
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
      ["Group ICT Availability Summary"],["","[DATE]","YTD","Comments"],
      ["Overall Availability","","","Target: 99.60%"],
      ["SBU - [MON-YEAR]","VMBS","VMWM","VMTS","VMPM","VMPS"],
      ["Standard Applications","","","","",""],["Business Critical Applications","","","","",""],
      ["Shared Services","","","","",""],["Network","","","","",""],["AVERAGE","","","","",""],
    ]),"Summary");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Application/Service","BSC Category","SBU","SLA (hrs)","SLA Minutes","Outage Minutes","# of Incidents","Availability %","Comments"]]),"Application Availability");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Node","AssetType","IP Address","Average Availability","SBU","ServerType"]]),"Infrastructure Availability");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["VMBS Network Availability"],["LOCATION","% UP","SLA MET/NOT MET","Comments"]]),"Network Availability");
    XLSX.writeFile(wb,"ICT_Availability_Template.xlsx");
  }

  return(
    <div>
      <div className="h2l">Upload New Month</div>
      <div className="card">
        <div className="sub13" style={{marginBottom:10}}>Upload the monthly ICT Availability Excel file to add the new period. Must follow the standard four-sheet format.</div>
        <button className="cta2" onClick={downloadTemplate}>Download Template</button>
        <label className="cta" style={{display:"block",textAlign:"center",cursor:"pointer",marginTop:8}}>
          Upload Monthly File
          <input type="file" accept=".xlsx" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleUpload(e.target.files[0]);e.target.value="";}}/>
        </label>
        {upMsg&&<div className={upMsg.startsWith("v")?"okmsg":"errmsg"} style={{marginTop:8}}>{upMsg}</div>}
      </div>

      <div className="h2l">Admin Password</div>
      <div className="card">
        <input className="login-in" type="password" placeholder="Current password" value={cur} onChange={e=>setCur(e.target.value)}/>
        <input className="login-in" type="password" placeholder="New password (min 6 chars)" value={n1} onChange={e=>setN1(e.target.value)}/>
        <input className="login-in" type="password" placeholder="Confirm new password" value={n2} onChange={e=>setN2(e.target.value)}/>
        <button className="cta2" onClick={changePw}>Change Password</button>
        {pwMsg&&<div className={pwMsg.startsWith("v")?"okmsg":"errmsg"} style={{marginTop:8}}>{pwMsg}</div>}
        <div className="notebox" style={{marginTop:8}}>Password is stored on this device. Protects Settings and upload access. Default: vm2026</div>
      </div>

      <div className="h2l">Month End Instructions</div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {[
          ["Receive file","Obtain the monthly ICT Availability Excel file from the ICT team. Do not rename or reformat it."],
          ["Verify sheets","Confirm the file contains four sheets: Summary, Application Availability, Infrastructure Availability, and Network Availability."],
          ["Upload","Tap Upload Monthly File above and select the file. The app will parse the Summary sheet and append the new period automatically."],
          ["Confirm","Check the success message confirming the new month has been added, then verify it appears on the Overview tab."],
          ["Redeploy","Download the updated data.xlsx from Settings and hand it to ICT (Kemar) for redeployment on Azure so all users see the new period."],
          ["Archive","Save the original ICT Availability Excel file to the shared ICT folder for audit trail purposes."],
        ].map(([title,txt],i,arr)=>(
          <div key={i} style={{display:"flex",gap:14,padding:"12px 14px",
            borderBottom:i<arr.length-1?"1px solid var(--line)":"none",alignItems:"flex-start"}}>
            <div style={{color:"var(--red)",fontFamily:"Sora",fontWeight:800,fontSize:15,
              width:18,flexShrink:0,marginTop:1}}>{i+1}</div>

          ["1","Receive the monthly ICT Availability Excel file from the ICT team."],
          ["2","Verify the file contains four sheets: Summary, Application Availability, Infrastructure Availability, and Network Availability."],
          ["3","Do not rename or reformat the file — upload it as received."],
          ["4","Tap Upload Monthly File above and select the file."],
          ["5","Confirm the success message showing the new period has been added."],
          ["6","Check the Overview tab to verify the new month appears in the trend."],
          ["7","Share the updated app link with stakeholders or notify ICT to redeploy if hosted on Azure."],
        ].map(([n,txt])=>(
          <div key={n} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:n!=="7"?"1px solid var(--line)":"none",alignItems:"flex-start"}}>
            <div style={{width:24,height:24,borderRadius:99,background:"var(--red)",color:"#fff",
              fontFamily:"Sora",fontWeight:700,fontSize:11,display:"flex",alignItems:"center",
              justifyContent:"center",flexShrink:0,marginTop:1}}>{n}</div>
            <span style={{fontSize:13,lineHeight:1.5,color:"#4A403C"}}>{txt}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// -- MAIN APP -----------------------------------------------------


function App(){
  const [tab,setTab]=useState("overview");
  const [admin,setAdmin]=useState(()=>{try{return sessionStorage.getItem("vmicts_admin")==="1";}catch(e){return false;}});
  const [adminPw,setAdminPwState]=useState(()=>ls.get("vmicts_pw",DEFAULT_PW));
  const [pwOpen,setPwOpen]=useState(false);
  const [pwTry,setPwTry]=useState("");
  const [pwErr,setPwErr]=useState("");
  const [pwNext,setPwNext]=useState(null);
  const [data,setData]=useState({
    months:[...MONTHS],overall:[...OVERALL],sbuAvgs:[...SBU_AVGS],
    appAvail:[...APP_AVAIL],netAvail:[...NET_AVAIL],infraAvail:[...INFRA_AVAIL],
  });

  function setAdminPw(p){setAdminPwState(p);ls.set("vmicts_pw",p);}
  function tryLogin(){
    if(pwTry===adminPw){
      try{sessionStorage.setItem("vmicts_admin","1");}catch(e){}
      setAdmin(true);setPwOpen(false);
      if(pwNext){setTab(pwNext);setPwNext(null);}
    }else setPwErr("Incorrect password.");
  }

  const TABS=[
    ["overview", "Overview",  "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z",                false],
    ["details",  "Details",   "M4 6h16M4 12h16M4 18h10",                                     false],
    ["history",  "History",   "M4 4v16h16M8 14v3M12 9v8M16 12v5",                             false],
    ["lifecycle","Lifecycle", "M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z",false],
    ["report",   "Report",    "M12 3v12m0 0l-4-4m4 4l4-4M5 21h14",                            false],
    ["settings", "Settings",  "M12 8a4 4 0 100 8 4 4 0 000-8zM19 12a7 7 0 01-.1 1.2l2 1.6-2 3.4-2.4-1a7 7 0 01-2 1.2L14 21h-4l-.5-2.6a7 7 0 01-2-1.2l-2.4 1-2-3.4 2-1.6A7 7 0 015 12",true],
  ];

  return(
    <div className="shell">
      <div className="app">
        <div className="appbar">
          <img src={LOGO_SRC} alt="VM" style={{height:26,width:"auto",flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div className="brand">VM Group ICT</div>
            <div className="sub" style={{fontWeight:500}}>Availability Monitor - {data.months[data.months.length-1]}</div>
          </div>
          {admin
            ?<button className="userchip" title="Sign out"
               onClick={()=>{try{sessionStorage.removeItem("vmicts_admin");}catch(e){}setAdmin(false);if(tab==="settings")setTab("overview");}}>A</button>
            :<button className="loginpill" onClick={()=>{setPwOpen(true);setPwTry("");setPwErr("");}}>
               <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                 <rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/>
               </svg> Login
             </button>}
        </div>

        <div className="content">
          {tab==="overview"  &&<OverviewTab   data={data}/>}
          {tab==="details"   &&<DetailsTab    data={data}/>}
          {tab==="history"   &&<HistoryTab    data={data}/>}
          {tab==="lifecycle" &&<LifecycleTab/>}
          {tab==="report"    &&<ReportTab     data={data}/>}
          {tab==="settings"  &&(admin?<SettingsTab adminPw={adminPw} setAdminPw={setAdminPw} data={data} setData={setData}/>:null)}
        </div>

        {pwOpen&&(
          <div className="overlay" onClick={()=>setPwOpen(false)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <button className="modalx" onClick={()=>setPwOpen(false)}>x</button>
              <div className="t15" style={{marginBottom:4,paddingRight:28}}>Admin sign-in</div>
              <div className="sub13" style={{marginBottom:12}}>Required for Settings. All other tabs are open to everyone.</div>
              <input className="login-in" type="password" placeholder="Admin password" value={pwTry} autoFocus
                onChange={e=>setPwTry(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")tryLogin();}}/>
              {pwErr&&<div className="errmsg">{pwErr}</div>}
              <button className="cta" onClick={tryLogin}>Unlock</button>
              <button className="cta2" onClick={()=>setPwOpen(false)}>Cancel</button>
            </div>
          </div>
        )}

        <div className="tabbar">
          {TABS.map(([id,label,icon,locked])=>(
            <button key={id} className={"tabbtn"+(tab===id?" on":"")}
              onClick={()=>{
                if(locked&&!admin){setPwNext(id);setPwOpen(true);setPwTry("");setPwErr("");return;}
                setTab(id);window.scrollTo(0,0);
              }}>
              <span className="iconwrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d={icon}/>
                </svg>
                {locked&&!admin&&(
                  <svg className="tablock" width="11" height="11" viewBox="0 0 24 24" fill="#fff" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/>
                  </svg>
                )}
              </span>
              <span>{label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
